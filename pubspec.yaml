name: bookly
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0' # تم ضبط الـ SDK ليكون أكثر استقراراً

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Design ---
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^11.0.0
  gap: ^3.0.1
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.0.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  google_nav_bar: ^5.0.7
  line_icons: ^2.0.3

  # --- Navigation & Logic ---
  go_router: ^17.1.0
  get_it: ^9.2.1
  equatable: ^2.0.8
  dartz: ^0.10.1
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  url_launcher: ^6.3.2
  easy_debounce: ^2.0.3

  # --- Local Database & Persistence ---
  hydrated_bloc: ^10.1.1
  path_provider: ^2.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # --- Testing & Preview ---
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4

# dependency_overrides:
#   analyzer: ^12.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/booklogo.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: GT Sectra Fine Regular
      fonts:
        - asset: assets/fonts/GT Sectra Fine Regular.ttf
